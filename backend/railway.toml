# railway.toml — backend (Express API) service config
# In Railway, create a service from this repo and set Root Directory to "backend".

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
